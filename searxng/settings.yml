use_default_settings: true

general:
  debug: false
  instance_name: "VIKUP SearXNG"

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  secret_key: "vikup-internal-searxng-change-me"
  limiter: false
  image_proxy: false
  method: "GET"
  public_instance: false

valkey:
  url: false

outgoing:
  request_timeout: 4.0
  max_request_timeout: 10.0
  enable_http2: true
